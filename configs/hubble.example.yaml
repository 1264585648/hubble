server:
  host: 0.0.0.0
  port: 8000

runtime:
  timezone: Asia/Shanghai
  dedup_window_seconds: 300
  default_tool_timeout_seconds: 10
  enable_model_analysis: true
  dry_run: true

ingress:
  webhook:
    enabled: true
    endpoints:
      - name: demo
        path: /webhook/demo
        secret_env: HUBBLE_DEMO_WEBHOOK_SECRET
      - name: prometheus
        type: alertmanager
        path: /webhook/alertmanager/prometheus
        secret_env: HUBBLE_ALERTMANAGER_WEBHOOK_SECRET

  polling:
    enabled: false
    jobs:
      - name: example-api-health
        interval_seconds: 60
        source: internal-api
        url: https://example.com/health
        method: GET
        timeout_seconds: 5

intake:
  enabled: true
  dry_run:
    enabled: true
    path: /intake-rules/dry-run
  stats:
    enabled: true
    returned_by: /intake-rules
  admin_page:
    enabled: true
    path: /admin/intake-rules
  rules:
    - name: drop-dev-low-alerts
      enabled: true
      priority: 10
      match:
        labels.env: dev
        data.severity: low
      action: drop
      reason: 开发环境 low 告警不进入主链路

    - name: tag-payment-alerts
      enabled: true
      priority: 20
      match:
        labels.service: payment-api
      action: tag
      add_labels:
        owner_team: payment-sre
        business: payment
      reason: 给支付服务告警补充路由标签

    - name: rewrite-missing-severity
      enabled: false
      priority: 30
      match:
        source: demo
      action: rewrite
      set_fields:
        severity: medium
      reason: 示例：给缺失 severity 的事件补默认值

policies:
  rules:
    - name: payment-critical-route
      enabled: true
      priority: 10
      match:
        labels.service: payment-api
        labels.env: prod
        severity: critical
      should_notify: true
      should_analyze: true
      channels: [console]
      enrich_tools: [query_logs, query_prometheus]
      escalation_channels: [console]
      require_approval: false

    - name: dev-info-no-notify
      enabled: true
      priority: 50
      match:
        labels.env: dev
        severity: info
      should_notify: false
      should_analyze: false
      channels: []
      enrich_tools: []
      escalation_channels: []
      require_approval: false

model:
  router: default
  providers:
    - name: echo
      type: echo
      enabled: true
    - name: openai-compatible
      type: openai_compatible
      enabled: false
      base_url_env: HUBBLE_MODEL_BASE_URL
      api_key_env: HUBBLE_MODEL_API_KEY
      model_env: HUBBLE_MODEL_NAME
      timeout_seconds: 20

  routing:
    default_provider: echo
    rules:
      - when: severity in ['critical', 'high']
        provider: openai-compatible
      - when: severity in ['low', 'info']
        provider: echo

tools:
  enabled: true
  auto_execute_readonly: true
  require_confirmation_for_dangerous: true
  registry:
    - name: query_logs
      type: http
      enabled: false
      description: Query logs from an internal log service.
      method: POST
      url_env: HUBBLE_QUERY_LOGS_URL
      timeout_seconds: 10
      dangerous: false
    - name: query_database
      type: sql
      enabled: false
      description: Execute read-only SQL query against a configured database.
      dsn_env: HUBBLE_DATABASE_DSN
      timeout_seconds: 10
      dangerous: false

notifiers:
  default_channels: [console]
  channels:
    - name: console
      type: console
      enabled: true
    - name: feishu-sre
      type: feishu
      enabled: false
      webhook_url_env: HUBBLE_FEISHU_WEBHOOK_URL
      secret_env: HUBBLE_FEISHU_WEBHOOK_SECRET
      timeout_seconds: 10
    - name: wecom-sre
      type: wecom
      enabled: false
      webhook_url_env: HUBBLE_WECOM_WEBHOOK_URL

session:
  enabled: false
  adapters:
    - name: cli
      type: cli
      enabled: true
    - name: feishu
      type: feishu
      enabled: false
      app_id_env: HUBBLE_FEISHU_APP_ID
      app_secret_env: HUBBLE_FEISHU_APP_SECRET

storage:
  type: memory
  postgres:
    dsn_env: HUBBLE_POSTGRES_DSN
  redis:
    url_env: HUBBLE_REDIS_URL
